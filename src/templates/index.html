{% load static %}<!doctype html>
<html lang="en" data-theme="quid">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QUID — Quest for Understanding Income & Debt</title>
  <link rel="icon" href="{% static 'img/favicon.ico' %}">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <!-- quid.js must be deferred BEFORE Alpine so its alpine:init listener fires in time -->
  <script defer src="{% static 'js/quid.js' %}"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{% static 'css/quid.css' %}" />
</head>

<body class="flex items-center justify-center p-6" x-data="quid" x-init="boot()">

  <div class="phone">
    <div class="screen">

      <!-- ===== loading ===== -->
      <template x-if="!state">
        <div class="flex-1 flex items-center justify-center">
          <span class="pixel text-xs neon">BOOTING…</span>
        </div>
      </template>

      <template x-if="state">
        <div class="contents">

          <!-- ===== status bar ===== -->
          <header class="status-bar">
            <span class="pixel text-[10px] neon">QUID</span>
            <span class="dim date-cluster" :class="dayPulse ? 'date-pulse' : ''">
              <span x-text="dayName(state.day_of_week)"></span>
              · <span x-text="monthName(state.month)"></span>
              <span x-text="state.day"></span>
            </span>
            <span class="gold" x-text="moneyBig(checking)"></span>
          </header>

          <!-- ===== app area ===== -->
          <main class="app-area">

            <!-- ---------- HOME ---------- -->
            <section x-show="activeApp === 'home'" class="col g-10">
              <div class="card col g-6">
                <div class="row">
                  <span class="sub-h" x-text="houseName(state.house.tier)"></span>
                  <span class="pill dim" x-text="'Rent ' + moneyBig(state.house.monthly_rent)"></span>
                </div>
                <p class="text-sm leading-snug" x-text="houseFlavor(state.house.tier)"></p>

                <div class="col g-4 mt-1">
                  <div class="row text-xs">
                    <span class="dim">Shoddiness</span>
                    <span x-text="state.house.shoddiness + '/10'"></span>
                  </div>
                  <div class="bar bad"><span :style="`width: ${state.house.shoddiness * 10}%`"></span></div>

                  <div class="row text-xs mt-1">
                    <span class="dim">Durability</span>
                    <span x-text="state.house.durability + '/10'"></span>
                  </div>
                  <div class="bar"><span :style="`width: ${state.house.durability * 10}%`"></span></div>
                </div>

                <div class="row text-xs mt-2 dim">
                  <span x-text="state.house.distance_to_work_km + ' km to work'"></span>
                  <span x-text="'Day ' + state.day + ' · ' + dayName(state.day_of_week)"></span>
                </div>
              </div>

              <div class="col g-6">
                <button class="btn-q" @click="advanceDay()">Advance one day</button>
                <button class="btn-q mag" @click="advanceUntilEvent()">Advance until event</button>
              </div>

              <div class="card col g-6">
                <span class="sub-h">Upcoming · next 10 days</span>
                <template x-if="upcomingCalendar.length === 0">
                  <p class="dim text-sm">No scheduled events.</p>
                </template>
                <template x-for="c in upcomingCalendar" :key="c.month + '-' + c.day + '-' + c.kind">
                  <div class="row text-sm" style="padding: 4px 0; border-bottom: 1px dashed rgba(255,255,255,0.05);">
                    <div class="col">
                      <span x-text="calendarLabel(c.kind)"></span>
                      <span class="text-xs dim" x-text="monthName(c.month) + ' ' + c.day"></span>
                    </div>
                    <span :class="calendarTone(c.kind)" x-text="moneyBig(calendarAmount(c)) + calendarAmountSuffix(c)"></span>
                  </div>
                </template>
              </div>

              <div class="card col g-6">
                <div class="row">
                  <span class="sub-h">This month · expenses</span>
                  <span class="text-xs dim" x-text="moneyBig(monthlyExpensesTotal)"></span>
                </div>
                <template x-if="monthlyExpenses.length === 0">
                  <p class="dim text-sm">Nothing spent this month yet.</p>
                </template>
                <template x-for="(e, i) in monthlyExpenses" :key="i">
                  <div class="row text-sm" style="padding: 4px 0; border-bottom: 1px dashed rgba(255,255,255,0.05);">
                    <span x-text="e.label"></span>
                    <span class="text-[color:var(--danger)]" x-text="'-' + moneyBig(e.amount)"></span>
                  </div>
                </template>
              </div>
            </section>

            <!-- ---------- BANK ---------- -->
            <section x-show="activeApp === 'bank'" class="col g-10">

              <div class="card col g-6 items-center">
                <span class="sub-h">Credit score</span>
                <div
                  class="gauge"
                  :style="`--pct: ${scorePct(state.credit_score)}; --band: ${scoreBand(state.credit_score)}`"
                >
                  <div class="gauge-inner">
                    <div class="gauge-val" x-text="state.credit_score"></div>
                    <div class="gauge-label">300 – 850</div>
                  </div>
                </div>
                <div class="row w-full text-xs">
                  <span class="dim">Net worth</span>
                  <span :class="netWorth >= 0 ? 'neon' : 'text-[color:var(--danger)]'"
                        x-text="moneyBig(netWorth)"></span>
                </div>
              </div>

              <!-- Accounts -->
              <div class="card col g-6">
                <span class="sub-h">Accounts</span>
                <div class="row">
                  <div class="col g-4">
                    <span class="text-xs dim">Checking</span>
                    <span class="gold text-lg" x-text="money(checking)"></span>
                  </div>
                  <div class="col g-4" style="text-align:right">
                    <span class="text-xs dim">Savings</span>
                    <span class="neon text-lg" x-text="money(savings)"></span>
                  </div>
                </div>

                <template x-if="state.accounts.savings_goal">
                  <div class="col g-4 mt-1">
                    <div class="row text-xs">
                      <span class="dim" x-text="'Goal · ' + state.accounts.savings_goal.name"></span>
                      <span x-text="moneyBig(savings) + ' / ' + moneyBig(state.accounts.savings_goal.target)"></span>
                    </div>
                    <div class="bar gold">
                      <span :style="`width: ${Math.min(100, (savings / state.accounts.savings_goal.target) * 100)}%`"></span>
                    </div>
                  </div>
                </template>

                <div class="row mt-2 g-6" style="gap:6px">
                  <button class="btn-q muted" style="flex:1" @click="openTransferModal()">Transfer</button>
                  <button class="btn-q muted" style="flex:1" @click="openBudgetModal()">Set budget</button>
                </div>
              </div>

              <!-- Credit card -->
              <template x-if="state.credit_card">
                <div class="card col g-6">
                  <div class="row">
                    <span class="sub-h">Credit card</span>
                    <span class="pill warn" x-text="'APR ' + Math.round(state.credit_card.apr * 100) + '%'"></span>
                  </div>
                  <div class="row">
                    <span class="dim text-xs">Balance</span>
                    <span x-text="money(state.credit_card.balance) + ' / ' + moneyBig(state.credit_card.limit)"></span>
                  </div>
                  <div class="bar mag">
                    <span :style="`width: ${Math.min(100, (state.credit_card.balance / state.credit_card.limit) * 100)}%`"></span>
                  </div>
                  <div class="row text-xs dim">
                    <span x-text="'Due day ' + state.credit_card.due_day"></span>
                    <span x-text="'Min ' + Math.round(state.credit_card.min_payment_pct * 100) + '%'"></span>
                  </div>
                </div>
              </template>

              <!-- Loans -->
              <template x-if="state.loans.length > 0">
                <div class="card col g-6">
                  <span class="sub-h">Loans</span>
                  <template x-for="(loan, i) in state.loans" :key="i">
                    <div class="col g-4">
                      <div class="row text-sm">
                        <span class="uppercase" x-text="loan.kind"></span>
                        <span x-text="moneyBig(loan.remaining) + ' / ' + moneyBig(loan.principal)"></span>
                      </div>
                      <div class="bar warn">
                        <span :style="`width: ${Math.max(0, 100 - (loan.remaining / Math.max(1, loan.principal)) * 100)}%`"></span>
                      </div>
                      <div class="row text-xs dim">
                        <span x-text="'APR ' + Math.round(loan.apr * 100) + '% · due day ' + loan.due_day"></span>
                        <span x-text="loan.payments_made + ' paid · ' + loan.payments_missed + ' missed'"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Products / unlocks -->
              <div class="card col g-6">
                <span class="sub-h">Products</span>
                <template x-for="key in ['cc_starter','personal_loan','bnpl','savings_premium','cc_better','deposit','investments','mortgage']" :key="key">
                  <div class="card-tight"
                       style="background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;"
                       :class="[productStatus(key) === 'locked_visible' ? 'locked' : '', productClickable(key) ? 'clickable' : '']"
                       :style="productClickable(key) ? 'cursor:pointer;' : ''"
                       @click="productClickable(key) && onProductClick(key)">
                    <div class="row">
                      <span class="text-sm" x-text="productLabel(key)"></span>
                      <template x-if="productClickable(key)">
                        <span class="pill" x-text="productOwned(key) ? 'Owned' : 'Apply'"></span>
                      </template>
                    </div>
                    <p class="text-xs dim" x-text="productBlurb(key)"></p>
                    <template x-if="productStatus(key) === 'locked_visible'">
                      <p class="text-xs" style="color: var(--warn)" x-text="'Needs: ' + productRequirement(key)"></p>
                    </template>
                  </div>
                </template>
              </div>
            </section>

            <!-- ---------- HEALTH ---------- -->
            <section x-show="activeApp === 'health'" class="col g-10">

              <div class="card col g-6">
                <span class="sub-h">Stats</span>
                <template x-for="s in statList" :key="s.key">
                  <div class="col g-4">
                    <div class="row text-xs">
                      <div style="display:flex; align-items:center; gap:6px;">
                        <img :src="s.icon" class="stat-icon" :alt="s.key" />
                        <span class="capitalize" x-text="s.key"></span>
                      </div>
                      <span x-text="state.player.stats[s.key] + ' / 100'"></span>
                    </div>
                    <div class="bar"
                         :class="state.player.stats[s.key] < 25 ? 'bad' : (state.player.stats[s.key] < 50 ? 'warn' : '')">
                      <span :style="`width: ${Math.max(0, Math.min(100, state.player.stats[s.key]))}%`"></span>
                    </div>
                  </div>
                </template>
              </div>

              <div class="card col g-6">
                <span class="sub-h">Skills</span>
                <template x-for="sk in skillList" :key="sk.key">
                  <div class="col g-4">
                    <div class="row text-xs">
                      <div style="display:flex; align-items:center; gap:6px;">
                        <img :src="sk.icon" class="stat-icon" :alt="sk.key" />
                        <span class="capitalize" x-text="sk.key"></span>
                      </div>
                      <span x-text="'LV ' + state.player.skills[sk.key] + ' / 10'"></span>
                    </div>
                    <div class="bar gold">
                      <span :style="`width: ${state.player.skills[sk.key] * 10}%`"></span>
                    </div>
                    <div class="row text-[10px] dim">
                      <span x-text="(state.player.skill_practice_counts[sk.key] || 0) + ' attempt(s) at this level'"></span>
                      <button class="btn-q muted"
                              style="padding: 4px 8px; font-size: 8px;"
                              :disabled="state.actions_today === 0"
                              @click="practiceSkill(sk.key)">
                        Practice
                      </button>
                    </div>
                  </div>
                </template>
              </div>

              <div class="card col g-6">
                <div class="row">
                  <span class="sub-h">Daily action</span>
                  <span :class="state.actions_today > 0 ? 'pill' : 'pill dim'"
                        x-text="state.actions_today > 0 ? 'Available' : 'Used'"></span>
                </div>
                <button class="btn-q"
                        :disabled="state.actions_today === 0"
                        @click="rest()">
                  Rest
                </button>
                <p class="text-xs dim">Recovers sanity and energy. Consumes today's action.</p>
              </div>
            </section>

            <!-- ---------- EMAIL ---------- -->
            <section x-show="activeApp === 'email'" class="col g-10">

              <!-- list view -->
              <template x-if="!openEvent">
                <div class="col g-6">
                  <div class="row">
                    <span class="sub-h">Inbox</span>
                    <span class="pill dim" x-text="unreadCount + ' unread'"></span>
                  </div>

                  <template x-if="inboxSorted.length === 0">
                    <div class="col g-6">
                      <p class="dim text-sm">No messages yet. Try "advance until event" from Home.</p>
                      <button class="btn-q mag" @click="summonEvent()">Summon event now</button>
                    </div>
                  </template>

                  <template x-for="ref in inboxSorted" :key="ref.event_id">
                    <div class="inbox-row" :class="ref.status === 'unread' ? 'unread' : ''"
                         @click="openEventRef(ref)">
                      <div class="unread-dot" x-show="ref.status === 'unread'"></div>
                      <div class="col g-4" style="flex:1; min-width:0;">
                        <div class="row text-xs dim">
                          <span x-text="ref.event.sender || 'Unknown'"></span>
                          <span x-text="monthName(ref.received_month) + ' ' + ref.received_day"></span>
                        </div>
                        <span class="text-sm truncate" x-text="ref.event.title"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- detail view -->
              <template x-if="openEvent">
                <div class="col g-8">
                  <button class="btn-q muted" style="align-self:flex-start; padding: 4px 10px; font-size: 8px;"
                          @click="openEventId = null; lastResolution = null">
                    ← Back
                  </button>

                  <div class="col g-4">
                    <span class="text-xs dim"
                          x-text="openEvent.event.sender + ' · ' + monthName(openEvent.received_month) + ' ' + openEvent.received_day"></span>
                    <h2 class="pixel text-sm magenta" x-text="openEvent.event.title"></h2>
                  </div>

                  <div class="text-sm leading-snug" x-html="tinyMd(openEvent.event.body)"></div>

                  <!-- options -->
                  <template x-if="!lastResolution">
                    <div class="col g-6">
                      <template x-for="opt in openEvent.event.options" :key="opt.id">
                        <div class="option-card"
                             :class="rollingEventId ? 'disabled' : ''"
                             @click="rollingEventId || resolveOption(opt)">
                          <div class="row">
                            <span class="text-sm" x-text="opt.label"></span>
                            <template x-if="opt.skill_check">
                              <span class="pill warn"
                                    x-text="opt.skill_check.skill + ' DC ' + opt.skill_check.difficulty_class"></span>
                            </template>
                            <template x-if="!opt.skill_check">
                              <span class="pill">Auto</span>
                            </template>
                          </div>
                          <div class="row text-xs dim mt-1">
                            <span></span>
                            <span x-text="successPct(opt) + '% success'"></span>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- resolution -->
                  <template x-if="lastResolution">
                    <div class="card col g-6 items-center text-center roll-result">
                      <span class="pixel text-xs dim">ROLL</span>
                      <span class="pixel text-3xl"
                            :class="lastResolution?.passed ? 'flash-pass' : 'flash-fail'"
                            x-text="lastResolution?.rolled"></span>
                      <template x-if="lastResolution?.skill">
                        <span class="text-xs dim"
                              x-text="'+ ' + lastResolution?.skillValue + ' ' + lastResolution?.skill + ' = ' + lastResolution?.total + ' vs DC ' + lastResolution?.dc"></span>
                      </template>
                      <template x-if="!lastResolution?.skill">
                        <span class="text-xs dim">no check</span>
                      </template>
                      <span class="pixel text-sm"
                            :class="lastResolution?.passed ? 'flash-pass' : 'flash-fail'"
                            x-text="lastResolution?.passed ? 'SUCCESS' : 'FAILURE'"></span>

                      <div class="col g-4 w-full mt-2">
                        <span class="sub-h">What happened</span>
                        <template x-if="!lastResolution?.effects || !Object.keys(lastResolution.effects).length">
                          <div class="text-sm dim">Nothing changed.</div>
                        </template>
                        <template x-for="fx in Object.entries(lastResolution?.effects || {})" :key="fx[0]">
                          <div class="row text-sm">
                            <span class="capitalize" x-text="fx[0]"></span>
                            <span :class="fx[1] >= 0 ? 'neon' : 'text-[color:var(--danger)]'"
                                  x-text="fx[0] === 'money' ? ((fx[1] >= 0 ? '+' : '') + moneyBig(fx[1])) : ((fx[1] >= 0 ? '+' : '') + fx[1])"></span>
                          </div>
                        </template>
                      </div>

                      <template x-if="lastResolution?.local">
                        <span class="text-[10px] dim">local resolution — /api/event/resolve not wired yet</span>
                      </template>

                      <button class="btn-q mt-2" @click="openEventId = null; lastResolution = null">Close</button>
                    </div>
                  </template>
                </div>
              </template>
            </section>

          </main>

          <!-- ===== toast ===== -->
          <template x-if="toast">
            <div class="toast" x-text="toast"></div>
          </template>

          <!-- ===== budget modal ===== -->
          <template x-if="budgetModalOpen">
            <div class="modal-overlay" @click.self="closeBudgetModal()">
              <div class="modal-panel col g-8">
                <div class="row">
                  <span class="sub-h" x-text="budgetModalRequired ? 'Set budget — required' : 'Set budget'"></span>
                  <button class="btn-q muted" style="padding: 4px 8px; font-size: 8px;"
                          x-show="!budgetModalRequired"
                          @click="closeBudgetModal()">Close</button>
                </div>

                <div class="col g-6">
                  <span class="text-xs dim">Food tier</span>
                  <template x-for="key in foodTierOrder()" :key="key">
                    <label class="option-card"
                           :class="budgetDraft.food_tier === key ? 'selected' : ''"
                           style="cursor:pointer; display:block;">
                      <div class="row">
                        <div class="row g-4" style="gap:6px">
                          <input type="radio" name="food_tier"
                                 :value="key" x-model="budgetDraft.food_tier" />
                          <span class="text-sm capitalize" x-text="key"></span>
                        </div>
                        <span class="pill gold" x-text="moneyBig(foodTier(key).cost) + ' / day'"></span>
                      </div>
                      <div class="row text-xs dim mt-1" style="flex-wrap:wrap; gap:8px;">
                        <span style="display:inline-flex; align-items:center; gap:4px;" class="neon">
                          <img :src="statIcon('hunger')" class="stat-icon" alt="hunger" />
                          <span x-text="'+' + foodTier(key).daily_hunger + '/day'"></span>
                        </span>
                        <template x-for="stat in ['health','sanity','energy']" :key="stat">
                          <span style="display:inline-flex; align-items:center; gap:4px;"
                                :class="foodTier(key)[stat] > 0 ? 'neon' : (foodTier(key)[stat] < 0 ? 'text-[color:var(--danger)]' : 'dim')">
                            <img :src="statIcon(stat)" class="stat-icon" :alt="stat" />
                            <span x-text="(foodTier(key)[stat] >= 0 ? '+' : '') + foodTier(key)[stat] + '/day'"></span>
                          </span>
                        </template>
                      </div>
                    </label>
                  </template>
                </div>

                <div class="col g-4">
                  <span class="text-xs dim">Leisure (PLN, cosmetic)</span>
                  <input type="number" min="0" class="budget-input"
                         x-model.number="budgetDraft.leisure" />
                </div>

                <div class="col g-4">
                  <span class="text-xs dim">Bills buffer (PLN, cosmetic)</span>
                  <input type="number" min="0" class="budget-input"
                         x-model.number="budgetDraft.bills_buffer" />
                </div>

                <button class="btn-q mag" :disabled="budgetSaving" @click="saveBudget()">
                  <span x-text="budgetSaving ? 'Saving…' : 'Save budget'"></span>
                </button>
              </div>
            </div>
          </template>

          <!-- ===== loan modal ===== -->
          <template x-if="loanModalOpen">
            <div class="modal-overlay" @click.self="closeLoanModal()">
              <div class="modal-panel col g-8">
                <div class="row">
                  <span class="sub-h" x-text="'Take ' + loanLabel(loanDraft.kind).toLowerCase()"></span>
                  <button class="btn-q muted" style="padding: 4px 8px; font-size: 8px;"
                          @click="closeLoanModal()">Close</button>
                </div>

                <div class="col g-4">
                  <span class="text-xs dim"
                        x-text="'APR ' + Math.round(loanApr(loanDraft.kind) * 100) + '% · max ' + (loanCap(loanDraft.kind)/100) + ' PLN'"></span>
                </div>

                <div class="col g-4">
                  <span class="text-xs dim">Amount (PLN)</span>
                  <input type="number" min="0" step="0.01" class="budget-input"
                         x-model.number="loanDraft.amount_pln" />
                </div>

                <button class="btn-q mag" :disabled="loanSaving" @click="saveLoan()">
                  <span x-text="loanSaving ? 'Submitting…' : 'Confirm'"></span>
                </button>
              </div>
            </div>
          </template>

          <!-- ===== transfer modal ===== -->
          <template x-if="transferModalOpen">
            <div class="modal-overlay" @click.self="closeTransferModal()">
              <div class="modal-panel col g-8">
                <div class="row">
                  <span class="sub-h">Transfer</span>
                  <button class="btn-q muted" style="padding: 4px 8px; font-size: 8px;"
                          @click="closeTransferModal()">Close</button>
                </div>

                <div class="col g-4">
                  <span class="text-xs dim">Direction</span>
                  <button type="button" class="transfer-toggle" @click="flipTransferDirection()">
                    <span class="tt-side"
                          :class="transferDraft.direction === 'to_savings' ? 'tt-active' : 'tt-muted'">
                      <span class="text-[10px] dim" x-text="transferDraft.direction === 'to_savings' ? 'From' : 'To'"></span>
                      <span class="text-sm">Checking</span>
                    </span>
                    <span class="tt-arrow-wrap">
                      <img src="{% static 'img/icon_arrow_right.png' %}" alt="→"
                           class="tt-arrow"
                           :class="transferDraft.direction === 'to_checking' ? 'tt-flip' : ''" />
                    </span>
                    <span class="tt-side"
                          :class="transferDraft.direction === 'to_checking' ? 'tt-active' : 'tt-muted'">
                      <span class="text-[10px] dim" x-text="transferDraft.direction === 'to_checking' ? 'From' : 'To'"></span>
                      <span class="text-sm">Savings</span>
                    </span>
                  </button>
                </div>

                <div class="col g-4">
                  <span class="text-xs dim">Amount (PLN)</span>
                  <input type="number" min="0" step="0.01" class="budget-input"
                         x-model.number="transferDraft.amount_pln" />
                  <span class="text-xs dim"
                        x-text="'Available: ' + money(transferDraft.direction === 'to_savings' ? checking : savings)"></span>
                </div>

                <button class="btn-q mag" :disabled="transferSaving" @click="saveTransfer()">
                  <span x-text="transferSaving ? 'Transferring…' : 'Transfer'"></span>
                </button>
              </div>
            </div>
          </template>

          <!-- ===== day advance popup (Persona3-style) ===== -->
          <template x-if="dayAdvanceAnim">
            <div class="day-advance-overlay" @click="clearTimeout(dayAdvanceTimer); dayAdvanceAnim = null">
              <div class="da-stripe da-stripe-1"></div>
              <div class="da-stripe da-stripe-2"></div>
              <div class="da-content">
                <div class="da-dow pixel" x-text="dayName(dayAdvanceAnim.to.dow)"></div>
                <div class="da-date">
                  <span class="da-month pixel" x-text="monthName(dayAdvanceAnim.to.month)"></span>
                  <span class="da-day-wrap">
                    <span class="da-day da-day-old pixel" x-text="dayAdvanceAnim.from.day"></span>
                    <span class="da-day da-day-new pixel" x-text="dayAdvanceAnim.to.day"></span>
                  </span>
                </div>
                <div class="da-tag pixel">NEXT DAY</div>
              </div>
            </div>
          </template>

          <!-- ===== game over ===== -->
          <template x-if="state.game_over">
            <div class="game-over-overlay">
              <h2>GAME OVER</h2>
              <p class="text-sm" x-text="'Cause: ' + state.game_over.cause"></p>
              <p class="text-sm italic" style="color: var(--fg-dim); max-width: 260px;"
                 x-text="state.game_over.flavor"></p>
              <button class="btn-q mag mt-2" @click="newGame(true)">New game</button>
            </div>
          </template>

          <!-- ===== dock ===== -->
          <nav class="dock">
            <button class="dock-btn" style="position:relative" :class="activeApp === 'email' ? 'active' : ''" @click="setApp('email')">
              <span class="unread-dot" x-show="unreadCount > 0"
                    style="position:absolute; top:2px; right:10px; width:7px; height:7px;"></span>
              <img src="{% static 'img/app_mail.png' %}" class="dock-icon" alt="Email" />
              <span class="pixel">EMAIL</span>
            </button>
            <button class="dock-btn" :class="activeApp === 'home' ? 'active' : ''" @click="setApp('home')">
              <img src="{% static 'img/app_home.png' %}" class="dock-icon" alt="Home" />
              <span class="pixel">HOME</span>
            </button>
            <button class="dock-btn" :class="activeApp === 'bank' ? 'active' : ''" @click="setApp('bank')">
              <img src="{% static 'img/app_bank.png' %}" class="dock-icon" alt="Bank" />
              <span class="pixel">BANK</span>
            </button>
            <button class="dock-btn" :class="activeApp === 'health' ? 'active' : ''" @click="setApp('health')">
              <img src="{% static 'img/app_health.png' %}" class="dock-icon" alt="Health" />
              <span class="pixel">HEALTH</span>
            </button>
          </nav>

        </div>
      </template>
    </div>
  </div>

  <!-- dev tools: visible in dev only; small + out of the way -->
  <div class="dev-bar">
    <button @click="newGame(true)">new game</button>
    <button @click="newDemoGame()">demo</button>
    <button @click="loadFakeState()">load fake</button>
    <button @click="exportSave()" x-show="state">export</button>
    <button @click="triggerImport()">import</button>
    <input type="file" x-ref="importFile" @change="importSave($event)" accept="application/json,.json" style="display:none" />
  </div>

</body>
</html>
